name: Weekly DL Theory Update

on:
  schedule:
    # Sunday at 11:59 PM Central Time is Monday at 4:59 AM UTC
    - cron: '59 4 * * 1'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push changes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r backend/requirements.txt

      - name: Run Update Script
        run: python3 update_digest.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/data/*.json frontend/public/digest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly arxiv update [$(date +'%Y-%m-%d')]"
            git pull --rebase origin main
            git push
          fi
